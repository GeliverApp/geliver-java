name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          server-id: 'central'
          server-username: 'CENTRAL_TOKEN_USERNAME'
          server-password: 'CENTRAL_TOKEN_PASSWORD'
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --yes --pinentry-mode loopback --passphrase "$MAVEN_GPG_PASSPHRASE" --import
          KEY_ID="$(gpg --batch --list-secret-keys --keyid-format LONG | awk '/^sec/{split($2, a, "/"); print a[2]; exit}')"
          test -n "$KEY_ID"
          echo "MAVEN_GPG_KEYNAME=$KEY_ID" >> "$GITHUB_ENV"
      - name: Verify imported GPG key
        run: gpg --batch --list-secret-keys --keyid-format LONG
      - name: Deploy to Maven Central
        run: mvn -B -ntp -P release -DskipTests -Dcentral.autoPublish=true -Dcentral.waitUntil=published deploy
